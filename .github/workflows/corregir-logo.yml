name: Limpiar archivos temporales del logo

on:
  push:
    branches:
      - corrige-ruta-logo-institucional

permissions:
  contents: write

jobs:
  limpiar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: corrige-ruta-logo-institucional
          fetch-depth: 0
      - name: Retirar archivos temporales
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/corregir-logo.yml .github/logo-correccion.trigger
          git commit -m 'Retira archivos temporales de corrección del logo'
          git push origin HEAD:corrige-ruta-logo-institucional
